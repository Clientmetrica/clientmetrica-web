
<style>

<svg width="100%" viewBox="0 0 680 1040" role="img">
<title>Product page template — section-by-section layout</title>
<desc>Reusable template for MATY, Juanito, Roboto product pages</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Page chrome hint -->
<rect x="40" y="16" width="600" height="28" rx="6" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="ts" x="340" y="34" text-anchor="middle" fill="var(--color-text-tertiary)">Nav (shared component — not part of page template)</text>

<!-- ── S1 Hero ── -->
<g class="sec" onclick="sendPrompt('Give me copy guidelines and content spec for the Hero section of a Clientmetrica product page')">
  <rect class="sec-bg" x="40" y="56" width="600" height="100" rx="8" fill="#F75F23" opacity="0.12" stroke="#F75F23" stroke-width="1"/>

  <text class="ts" x="60" y="96" fill="var(--color-text-secondary)">Product name (ALL CAPS) · One-line value prop · Primary CTA → /contacto · Secondary CTA → anchor #how-it-works</text>
  <text class="ts" x="60" y="112" fill="var(--color-text-secondary)">Background: brand-navy or orange/navy gradient · Brand robot illustration (right side)</text>
  <text class="ts" x="60" y="128" fill="var(--color-text-secondary)">Copy owner: Marketing · Design owner: Design · Dev: Benja</text>
  <text class="tag" x="620" y="110" text-anchor="end" fill="#F75F23">P1</text>
</g>

<line x1="340" y1="156" x2="340" y2="172" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── S2 Problem ── -->
<g class="sec" onclick="sendPrompt('Give me copy guidelines and content spec for the Problem section of a Clientmetrica product page')">
  <rect class="sec-bg" x="40" y="172" width="600" height="84" rx="8" fill="#12145F" opacity="0.1" stroke="#12145F" stroke-width="0.8"/>
  <rect x="40" y="172" width="4" height="84" rx="2" fill="#12145F"/>
  <text class="th" x="60" y="193" fill="var(--color-text-primary)">S2 · Problem statement</text>
  <text class="ts" x="60" y="211" fill="var(--color-text-secondary)">2–3 pain points the target buyer recognises immediately. ROI framing — cost of NOT solving.</text>
  <text class="ts" x="60" y="227" fill="var(--color-text-secondary)">Format: 3-column icon + stat cards · Background: white</text>
  <text class="ts" x="60" y="243" fill="var(--color-text-secondary)">Copy owner: Marketing · Design: icon set</text>
  <text class="tag" x="620" y="230" text-anchor="end" fill="var(--color-text-tertiary)">P1</text>
</g>

<line x1="340" y1="256" x2="340" y2="272" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── S3 How it works ── -->
<g class="sec" onclick="sendPrompt('Give me copy guidelines and content spec for the How It Works section of a Clientmetrica product page')">
  <rect class="sec-bg" x="40" y="272" width="600" height="96" rx="8" fill="#F75F23" opacity="0.08" stroke="#F75F23" stroke-width="0.8"/>
  <rect x="40" y="272" width="4" height="96" rx="2" fill="#F75F23"/>
  <text class="th" x="60" y="293" fill="var(--color-text-primary)">S3 · How it works</text>
  <text class="ts" x="60" y="311" fill="var(--color-text-secondary)" id="anchor-hiw">id="how-it-works" — anchor target from Hero CTA</text>
  <text class="ts" x="60" y="327" fill="var(--color-text-secondary)">3–4 step visual flow (numbered). Business language, not tech. Each step: title + 1-sentence description.</text>
  <text class="ts" x="60" y="343" fill="var(--color-text-secondary)">Format: horizontal stepper or timeline · Background: brand-dark or navy</text>
  <text class="ts" x="60" y="358" fill="var(--color-text-secondary)">Copy: Marketing · Design: stepper component · Dev: Benja</text>
  <text class="tag" x="620" y="330" text-anchor="end" fill="var(--color-text-tertiary)">P1</text>
</g>

<line x1="340" y1="368" x2="340" y2="384" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── S4 Capabilities ── -->
<g class="sec" onclick="sendPrompt('Give me copy guidelines and content spec for the Capabilities section of a Clientmetrica product page')">
  <rect class="sec-bg" x="40" y="384" width="600" height="84" rx="8" fill="#5C38CE" opacity="0.07" stroke="#5C38CE" stroke-width="0.8"/>
  <rect x="40" y="384" width="4" height="84" rx="2" fill="#5C38CE"/>
  <text class="th" x="60" y="405" fill="var(--color-text-primary)">S4 · Capabilities / features</text>
  <text class="ts" x="60" y="423" fill="var(--color-text-secondary)">4–6 key capabilities. Each: icon + short title + 2-line description. Lead with outcome, not feature name.</text>
  <text class="ts" x="60" y="439" fill="var(--color-text-secondary)">Format: 2×3 card grid · Background: white · Card accent: product's tertiary color</text>
  <text class="ts" x="60" y="455" fill="var(--color-text-secondary)">Copy: Marketing · Design: icon set + card spec</text>
  <text class="tag" x="620" y="430" text-anchor="end" fill="var(--color-text-tertiary)">P1</text>
</g>

<line x1="340" y1="468" x2="340" y2="484" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── S5 ROI / Metrics ── -->
<g class="sec" onclick="sendPrompt('Give me copy guidelines and content spec for the ROI and Metrics section of a Clientmetrica product page')">
  <rect class="sec-bg" x="40" y="484" width="600" height="84" rx="8" fill="#F75F23" opacity="0.1" stroke="#F75F23" stroke-width="0.8"/>
  <rect x="40" y="484" width="4" height="84" rx="2" fill="#F75F23"/>
  <text class="th" x="60" y="505" fill="var(--color-text-primary)">S5 · ROI / metrics</text>
  <text class="ts" x="60" y="523" fill="var(--color-text-secondary)">3 headline numbers that make the business case. e.g. "40% reducción en tiempo de respuesta".</text>
  <text class="ts" x="60" y="539" fill="var(--color-text-secondary)">Format: large stat + label · Background: brand-orange · Text: white</text>
  <text class="ts" x="60" y="555" fill="var(--color-text-secondary)">Copy: CEO + Marketing (numbers must be defensible) · Design: stat component</text>
  <text class="tag" x="620" y="525" text-anchor="end" fill="#F75F23">P1</text>
</g>

<line x1="340" y1="568" x2="340" y2="584" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── S6 Integrations ── -->
<g class="sec" onclick="sendPrompt('Give me copy guidelines and content spec for the Integrations section of a Clientmetrica product page')">
  <rect class="sec-bg" x="40" y="584" width="600" height="72" rx="8" fill="var(--color-background-secondary)" stroke="var(--color-border-secondary)" stroke-width="0.8"/>
  <rect x="40" y="584" width="4" height="72" rx="2" fill="var(--color-border-secondary)"/>
  <text class="th" x="60" y="605" fill="var(--color-text-primary)">S6 · Integrations  <tspan fill="var(--color-text-tertiary)" font-size="12" font-weight="400">(shared across all product pages)</tspan></text>
  <text class="ts" x="60" y="623" fill="var(--color-text-secondary)">Logo strip: M365, Azure, HubSpot, + product-specific connectors. "Se integra con tu stack actual."</text>
  <text class="ts" x="60" y="639" fill="var(--color-text-secondary)">Format: horizontal scroll on mobile, centered row on desktop · Background: white</text>
  <text class="tag" x="620" y="618" text-anchor="end" fill="var(--color-text-tertiary)">P2</text>
</g>

<line x1="340" y1="656" x2="340" y2="672" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── S7 Social proof ── -->
<g class="sec" onclick="sendPrompt('Give me copy guidelines and content spec for the Social Proof section of a Clientmetrica product page')">
  <rect class="sec-bg" x="40" y="672" width="600" height="72" rx="8" fill="#12145F" opacity="0.08" stroke="#12145F" stroke-width="0.8" stroke-dasharray="4 3"/>
  <rect x="40" y="672" width="4" height="72" rx="2" fill="#12145F" opacity="0.4"/>
  <text class="th" x="60" y="693" fill="var(--color-text-secondary)">S7 · Social proof / testimonial  <tspan fill="var(--color-text-tertiary)" font-size="12" font-weight="400">(placeholder until you have clients)</tspan></text>
  <text class="ts" x="60" y="711" fill="var(--color-text-secondary)">Quote + name + role + company · OR CORFO recognition badge as interim trust signal</text>
  <text class="ts" x="60" y="727" fill="var(--color-text-secondary)">Format: single large quote card · Background: brand-dark</text>
  <text class="tag" x="620" y="706" text-anchor="end" fill="var(--color-text-tertiary)">P2</text>
</g>

<line x1="340" y1="744" x2="340" y2="760" stroke="var(--color-border-secondary)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── S8 CTA Bottom ── -->
<g class="sec" onclick="sendPrompt('Give me copy guidelines and content spec for the bottom CTA section of a Clientmetrica product page')">
  <rect class="sec-bg" x="40" y="760" width="600" height="72" rx="8" fill="#F75F23" opacity="0.12" stroke="#F75F23" stroke-width="1"/>
  <rect x="40" y="760" width="4" height="72" rx="2" fill="#F75F23"/>
  <text class="th" x="60" y="781" fill="#F75F23">S8 · Bottom CTA</text>
  <text class="ts" x="60" y="799" fill="var(--color-text-secondary)">Headline: "¿Listo para escalar sin escalar tu equipo?" · CTA button → /contacto</text>
  <text class="ts" x="60" y="815" fill="var(--color-text-secondary)">Background: brand-navy · Full-width · No competing links</text>
  <text class="tag" x="620" y="790" text-anchor="end" fill="#F75F23">P1</text>
</g>

<rect x="40" y="848" width="600" height="28" rx="6" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="ts" x="340" y="866" text-anchor="middle" fill="var(--color-text-tertiary)">Footer (shared component)</text>

<rect x="40" y="892" width="600" height="132" rx="8" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text class="th" x="56" y="914" fill="var(--color-text-secondary)">Per-product customisation hooks (later phase)</text>

<text class="ts" x="56" y="940" fill="var(--color-text-secondary)">Accent color — each product gets one tertiary color from the palette (MATY: sky #08A0DC · Juanito: purple #5C38CE · Roboto: TBD)</text>
<text class="ts" x="56" y="958" fill="var(--color-text-secondary)">S3 stepper — steps differ per product, component is shared</text>
<text class="ts" x="56" y="976" fill="var(--color-text-secondary)">S4 capability cards — content differs, card component is shared</text>
<text class="ts" x="56" y="994" fill="var(--color-text-secondary)">S5 ROI numbers — product-specific, must come from CEO/Marketing before dev starts</text>
<text class="ts" x="56" y="1012" fill="var(--color-text-secondary)">All other sections — content swapped via i18n JSON, no layout changes needed</text>
</svg>
